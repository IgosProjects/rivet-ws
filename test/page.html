<h1>WebSocket Test</h1>
    <input id="msg"><button onclick="send()">Send</button>
    <div id="output"></div>
    <script>
        const ws = new WebSocket('ws://localhost:3000/chat');
        ws.onmessage = (e) => {
            document.getElementById('output').innerHTML += '<p>' + e.data + '</p>';
        };
        function send() {
            const msg = document.getElementById('msg');
            ws.send(msg.value);
            msg.value = '';
        }
    </script>
